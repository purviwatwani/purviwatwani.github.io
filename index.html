<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Purvi's Website</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fdfbfb, #ebedee);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    p {
      font-size: 18px;
      color: #555;
      line-height: 1.6;
    }

    .emoji {
      font-size: 40px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="emoji">🌱</div>
    <h1>Hello, I’m Purvi</h1>
    <p>
      This is my first website.<br>
      I’m learning, building, and growing.
    </p>
  </div>
</body>
</html>
